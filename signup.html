<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FoodLion</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .auth-section {
            padding: 120px 20px 80px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa, #ffe8e2);
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 45px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(255,87,34,0.15);
            animation: authPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
            border-top: 4px solid #FF5722;
        }
        @keyframes authPop {
            from { opacity: 0; transform: scale(0.93) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .auth-card h1 { text-align: center; color: #333; margin-bottom: 28px; font-size: 1.7rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .form-group:focus-within label { color: #FF5722; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #FF5722;
            box-shadow: 0 0 0 3px rgba(255,87,34,0.12);
            transform: translateY(-1px);
        }
        .auth-card .btn { width: 100%; font-size: 1rem; padding: 13px; margin-top: 5px; }
        .auth-link { margin-top: 22px; text-align: center; color: #666; font-size: 0.9rem; }
        .auth-link a { color: #FF5722; font-weight: 700; text-decoration: none; }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo-section"><a href="index.html" class="logo"><img src="images/logo-final.png" alt="FoodLion Logo"></a></div>
            <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
            <nav>
                <ul>
                    <li><a href="index.html">Welcome</a></li>
                    <li><a href="restaurants.html" class="active">Restaurants</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contacts.html">Contact</a></li>
                    <li><a href="login.html" class="btn">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h1>Create Account 🦁</h1>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Strong password" required>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                </form>
                <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FoodLion. All rights reserved.</p>
        <p style="margin-top: 10px; font-size: 0.9rem;"><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms &amp; Conditions</a></p>
    </footer>
    <script src="JS/script.js"></script>
    <script>
        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            localStorage.setItem('currentUser', name);
            showNotification('🎉 Account created! Welcome, ' + name + '!');
            setTimeout(() => window.location.href = 'index.html', 1500);
        }
    </script>
</body>
</html>
