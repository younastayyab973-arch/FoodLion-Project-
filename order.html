<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FoodLion</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .checkout-wrapper {
            max-width: 1000px;
            margin: 110px auto 60px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            padding: 20px;
        }
        @media(max-width: 768px) { .checkout-wrapper { grid-template-columns: 1fr; } }

        .order-summary {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            height: fit-content;
            border-top: 4px solid #FF5722;
            animation: slideInLeft 0.6s ease both;
        }
        .form-container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: slideInRight 0.6s ease both;
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .form-container label {
            font-weight: 600;
            display: block;
            margin-bottom: 7px;
            color: #444;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .form-group:focus-within label { color: #FF5722; }
        .form-group { margin-bottom: 0; }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #FF5722;
            box-shadow: 0 0 0 3px rgba(255,87,34,0.12);
            transform: translateY(-1px);
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f5f5f5;
            color: #555;
            font-size: 0.95rem;
            transition: background 0.2s, padding 0.2s;
            border-radius: 4px;
        }
        .summary-item:hover {
            background: rgba(255,87,34,0.04);
            padding-left: 6px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 20px;
            padding-top: 12px;
            color: #FF5722;
            border-top: 2px solid #eee;
        }
        .order-summary h3 { margin-bottom: 20px; color: #333; font-size: 1.2rem; }
        .form-container h2 { color: #FF5722; margin-bottom: 25px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo-section"><a href="index.html" class="logo"><img src="images/logo-final.png" alt="FoodLion Logo"></a></div>
            <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
            <nav>
                <ul>
                    <li><a href="index.html">Welcome</a></li>
                    <li><a href="restaurants.html">Restaurants</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contacts.html">Contact</a></li>
                    <li><a href="login.html" class="btn">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="checkout-wrapper">
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="summary-content"><p style="color:#999;">Loading items...</p></div>
            </div>

            <div class="form-container">
                <h2>Delivery Details</h2>
                <form onsubmit="placeOrder(event)">
                    <label>Full Name</label>
                    <input type="text" id="order-name" required placeholder="Enter your name">
                    <label>Phone Number</label>
                    <input type="tel" required placeholder="0300-1234567">
                    <label>Delivery Address</label>
                    <textarea rows="3" required placeholder="House No, Street, Area..."></textarea>
                    <label>Payment Method</label>
                    <select>
                        <option>Cash on Delivery (COD)</option>
                        <option>Credit/Debit Card</option>
                    </select>
                    <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem;">
                        <i class="fa-solid fa-check"></i> Confirm Order
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 FoodLion. All rights reserved.</p>
        <p style="margin-top: 10px; font-size: 0.9rem;"><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms &amp; Conditions</a></p>
    </footer>

    <script src="JS/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('currentUser');
            if (user) document.getElementById('order-name').value = user;
            loadOrderSummary();
        });

        function loadOrderSummary() {
            const summaryBox = document.getElementById('summary-content');
            const urlParams = new URLSearchParams(window.location.search);
            const singleItem = urlParams.get('item');
            const singlePrice = urlParams.get('price');
            let total = 0;
            let html = '';

            if (singleItem && singlePrice) {
                html += `<div class="summary-item"><span><strong>${singleItem}</strong> (x1)</span><span>Rs. ${singlePrice}</span></div>`;
                total = parseInt(singlePrice);
            } else {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                if (cart.length === 0) {
                    html = '<p style="color:#999;">Your cart is empty.</p>';
                } else {
                    cart.forEach(item => {
                        html += `<div class="summary-item"><span>${item.item}</span><span>Rs. ${item.price}</span></div>`;
                        total += parseInt(item.price);
                    });
                }
            }

            html += `<div class="total-row"><span>Total Bill:</span><span>Rs. ${total}</span></div>`;
            summaryBox.innerHTML = html;
        }

        function placeOrder(e) {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.get('item')) localStorage.removeItem('cart');
            showNotification('🎉 Order Placed! Your food will arrive in ~30 minutes.');
            setTimeout(() => window.location.href = 'index.html', 2000);
        }
    </script>
</body>
</html>
